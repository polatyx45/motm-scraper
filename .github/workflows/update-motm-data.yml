name: Update MOTM Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-motm-data
  cancel-in-progress: false

jobs:
  build-static-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static MOTM data
        env:
          SCRAPER_BASE_URL: https://motm-scraper-826830852235.europe-west3.run.app
        run: npm run build:static

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A static-data obfuscation-map.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update MOTM static data"
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site/static-data
          cp index.html site/index.html
          cp -R static-data/. site/static-data/
          touch site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-static-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
